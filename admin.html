<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Harish's TypeFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            height: 100vh;
            overflow-y: auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem 2rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-title {
            font-size: 1.8rem;
            color: var(--accent-color);
        }

        .admin-nav {
            display: flex;
            gap: 1rem;
        }

        .btn-admin {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-admin:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
        }

        .btn-primary-admin {
            background: var(--accent-color);
            color: white;
            border: none;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
            flex-grow: 1;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow: hidden;
        }

        .card-header {
            font-size: 1.2rem;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
        }

        /* User List Styling */
        .user-list {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .user-item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .user-item:hover,
        .user-item.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
        }

        .user-name {
            font-weight: bold;
            color: var(--text-primary);
        }

        .user-email {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Stats Table */
        .stats-table-container {
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th,
        td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        th {
            color: var(--accent-color);
            position: sticky;
            top: 0;
            background: #0f172a;
            /* Solid bg for sticky header */
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .no-data {
            text-align: center;
            color: var(--text-secondary);
            padding: 2rem;
        }

        .json-actions {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
        }

        /* Badges */
        .badge-admin {
            background: var(--accent-color);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }

        @media (max-width: 900px) {
            .admin-container {
                padding: 1rem;
                height: auto;
            }

            .admin-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .admin-nav {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
            }
        }
    </style>
    <script>
        // Auth Guard
        const currentUser = JSON.parse(localStorage.getItem('typeFlow_user'));
        if (!currentUser || currentUser.role !== 'admin') {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body>

    <script>
        if (window.innerWidth < 900) {
            document.body.style.overflow = 'hidden';
            document.body.innerHTML = `
                <div style="position:fixed; top:0; left:0; width:100%; height:100dvh; background:#0f172a; z-index:999999; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px; box-sizing: border-box;">
                    <div style="font-size:3rem; margin-bottom:20px;">🚫📱</div>
                    <h2 style="color:white; margin-bottom:15px; font-family:sans-serif;">Desktop Only Zone</h2>
                    <p style="color:#cbd5e1; line-height:1.6; max-width:400px; font-family:sans-serif;">
                        For the best typing practice, this application requires a physical keyboard.<br><br>
                        Please open this page on your Laptop or Desktop.
                    </p>
                    <a href="index.html" style="margin-top:30px; color:var(--accent-color, #3b82f6); text-decoration:none; font-family:sans-serif;">Return to Home</a>
                </div>
            `;
        }
    </script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="admin-container">

        <!-- Header -->
        <div class="admin-header">
            <div>
                <div class="admin-title">Admin Dashboard</div>
                <div style="font-size: 0.9rem; color: var(--text-secondary);">Welcome, Admin</div>
            </div>
            <div class="admin-nav">
                <a href="app.html" class="btn-admin">Launch App</a>
                <button onclick="downloadDatabase()" class="btn-admin btn-primary-admin">Download DB
                    (users.json)</button>
                <button onclick="logout()" class="btn-admin"
                    style="color: var(--incorrect-color); border-color: rgba(248,113,113,0.3);">Logout</button>
            </div>
        </div>

        <div class="dashboard-grid">

            <!-- User List -->
            <div class="glass-card">
                <div class="card-header">Registered Users</div>
                <div class="user-list" id="user-list">
                    <!-- Loaded via JS -->
                    <div style="padding:1rem;">Loading...</div>
                </div>
            </div>

            <!-- User Detail / Reports -->
            <div class="glass-card">
                <div class="card-header" id="report-header">Select a user to view details</div>
                <div class="stats-table-container" id="report-content">
                    <div class="no-data">Select a user from the left to see their typing history and stats.</div>
                </div>
            </div>

        </div>

    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';

        // State
        let allUsers = [];

        async function initAdmin() {
            console.log("Loading Admin Data via Supabase...");
            try {
                const { data: users, error } = await supabase
                    .from('profiles')
                    .select('*');

                if (error) throw error;
                allUsers = users || [];

                renderUserList();
            } catch (err) {
                console.error("Error loading users:", err);
                document.getElementById('user-list').innerHTML = '<div style="color:red; padding:1rem;">Error loading users. Check console.</div>';
            }
        }

        function renderUserList() {
            const listContainer = document.getElementById('user-list');
            listContainer.innerHTML = '';

            allUsers.forEach(user => {
                const el = document.createElement('div');
                el.className = 'user-item';
                // Highlight Admin Badge
                const badge = user.role === 'admin' ? '<span class="badge-admin">ADMIN</span>' : '';

                el.innerHTML = `
                    <div class="user-name">
                        ${user.name || 'Unnamed'} 
                        ${badge}
                    </div>
                    <div class="user-email">${user.email}</div>
                `;
                el.onclick = () => {
                    document.querySelectorAll('.user-item').forEach(i => i.classList.remove('active'));
                    el.classList.add('active');
                    loadUserReport(user);
                };
                listContainer.appendChild(el);
            });
        }

        async function loadUserReport(user) {
            const header = document.getElementById('report-header');
            const content = document.getElementById('report-content');

            header.innerHTML = `Report for: <span style="color:var(--accent-color)">${user.name}</span> <span style="font-size:0.8rem">(${user.id})</span>`;
            content.innerHTML = '<div style="padding:1rem;">Loading history...</div>';

            try {
                // Fetch History specific to this user from DB 'typing_history'
                const { data: userHistory, error } = await supabase
                    .from('typing_history')
                    .select('*')
                    .eq('user_id', user.id);

                if (error) throw error;

                if (!userHistory || userHistory.length === 0) {
                    content.innerHTML = '<div class="no-data">No history found for this user.</div>';
                    return;
                }

                // Calculations
                const totalWPM = Math.round(userHistory.reduce((acc, cur) => acc + (parseInt(cur.wpm) || 0), 0) / userHistory.length);
                const totalAcc = Math.round(userHistory.reduce((acc, cur) => acc + (parseInt(cur.accuracy) || 0), 0) / userHistory.length);
                const totalCards = userHistory.length;

                let html = `
                    <div style="display:flex; gap:20px; margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px solid rgba(255,255,255,0.1)">
                        <div>Total Sessions: <strong>${totalCards}</strong></div>
                        <div>Avg WPM: <strong style="color:var(--accent-color)">${totalWPM}</strong></div>
                        <div>Avg Acc: <strong style="color:var(--correct-color)">${totalAcc}%</strong></div>
                    </div>
                    <div class="stats-table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Lesson</th>
                                <th>WPM</th>
                                <th>Acc</th>
                                <th>Err</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                // Sort by date desc
                userHistory.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                userHistory.forEach(rec => {
                    const date = new Date(rec.timestamp).toLocaleString();
                    html += `
                        <tr>
                            <td>${date}</td>
                            <td>${rec.lesson || '-'}</td>
                            <td>${rec.wpm}</td>
                            <td>${rec.accuracy}</td>
                            <td>${rec.errors}</td>
                        </tr>
                    `;
                });

                html += '</tbody></table></div>';
                content.innerHTML = html;

            } catch (err) {
                console.error("Error loading history:", err);
                content.innerHTML = `<div style="color:red">Error loading history: ${err.message}</div>`;
            }
        }

        // Attach global functions to window
        window.downloadDatabase = function () {
            const data = JSON.stringify(allUsers, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'users_backup.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        window.logout = async function () {
            await supabase.auth.signOut();
            localStorage.removeItem('typeFlow_user');
            window.location.href = 'index.html';
        };

        // Initialize
        initAdmin();

    </script>
</body>

</html>
