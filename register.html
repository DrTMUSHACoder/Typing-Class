<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Harish's TypeFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            overflow: auto;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .auth-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            margin: 0 auto;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-family: var(--font-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: var(--accent-color);
            background: rgba(0, 0, 0, 0.5);
        }

        .auth-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .auth-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        #error-msg {
            color: var(--incorrect-color);
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>

<body>

    <script>
        if (window.innerWidth < 900) {
            document.body.style.overflow = 'hidden';
            document.body.innerHTML = `
                <div style="position:fixed; top:0; left:0; width:100%; height:100dvh; background:#0f172a; z-index:999999; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px; box-sizing: border-box;">
                    <div style="font-size:3rem; margin-bottom:20px;">🚫📱</div>
                    <h2 style="color:white; margin-bottom:15px; font-family:sans-serif;">Desktop Only Zone</h2>
                    <p style="color:#cbd5e1; line-height:1.6; max-width:400px; font-family:sans-serif;">
                        For the best typing practice, this application requires a physical keyboard.<br><br>
                        Please open this page on your Laptop or Desktop.
                    </p>
                    <a href="index.html" style="margin-top:30px; color:var(--accent-color, #3b82f6); text-decoration:none; font-family:sans-serif;">Return to Home</a>
                </div>
            `;
        }
    </script>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Start your typing journey today</p>
            </div>

            <form id="register-form">
                <div id="error-msg"></div>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="Harish A S" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Choose a password" required>
                </div>
                <button type="submit" class="auth-btn">Sign Up</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const registerForm = document.getElementById('register-form');
        const errorMsg = document.getElementById('error-msg');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log("Form submitted via Firebase");

            const btn = registerForm.querySelector('.auth-btn');

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Basic Client validation
            if (password.length < 6) {
                errorMsg.innerText = "Password must be at least 6 characters.";
                errorMsg.style.display = 'block';
                return;
            }

            btn.innerText = "Creating Account...";
            btn.disabled = true;

            try {
                // 1. Create Auth User
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Save User to Database (including name)
                await set(ref(db, 'users/' + user.uid), {
                    name: name,
                    email: email,
                    role: 'user',
                    createdAt: new Date().toISOString()
                });

                console.log("User registered:", user);
                // Redirect
                window.location.href = 'app.html';

            } catch (error) {
                console.error("Signup error:", error);
                let message = "An error occurred.";
                if (error.code === 'auth/email-already-in-use') {
                    message = "Email already in use.";
                } else if (error.code === 'auth/weak-password') {
                    message = "Password too weak.";
                } else {
                    message = error.message;
                }

                errorMsg.innerText = message;
                errorMsg.style.display = 'block';
                btn.innerText = "Sign Up";
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
